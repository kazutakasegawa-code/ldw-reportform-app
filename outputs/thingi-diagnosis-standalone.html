<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>人材育成・組織開発 課題診断 | Life Design Works</title>
  <style>
    :root{--navy:#102a4f;--gold:#d6a819;--bg:#f4f7fb;--line:#dbe3ef;--text:#0f172a;--muted:#64748b}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",system-ui,sans-serif;line-height:1.75}a{color:inherit}.wrap{max-width:1120px;margin:auto;padding:28px 18px}.hero{min-height:78vh;display:grid;align-items:center;background:linear-gradient(120deg,#fff 0%,#f8fafc 62%,#fff7d6 100%)}.hero h1{font-size:clamp(40px,8vw,78px);line-height:1.08;margin:14px 0;color:var(--navy);letter-spacing:0}.lead{font-size:18px;max-width:760px}.grid{display:grid;gap:18px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card{background:white;border:1px solid var(--line);border-radius:8px;padding:22px;box-shadow:0 10px 30px rgba(15,23,42,.06)}.section{margin:22px 0}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:10px 18px;border:0;border-radius:6px;background:var(--navy);color:white;font-weight:700;cursor:pointer;text-decoration:none}.btn.gold{background:var(--gold);color:var(--navy)}.btn.light{background:white;color:var(--navy);border:1px solid var(--navy)}.btn:disabled{opacity:.55;cursor:not-allowed}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:22px}.brand{font-weight:800;color:var(--navy)}label{display:block;font-weight:700;margin:10px 0 6px}.req{color:#b91c1c}input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:6px;padding:11px 12px;font:inherit;background:white}textarea{min-height:96px}.checks{display:grid;gap:10px}.checkrow{display:flex;gap:10px;align-items:flex-start;padding:10px;border:1px solid var(--line);border-radius:6px;background:#fff}.checkrow input{width:auto;margin-top:8px}.radioGroup{display:flex;flex-wrap:wrap;gap:8px}.radioGroup label{margin:0;display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:white}.radioGroup input{width:auto}.notice{background:#fff8db;border:1px solid #f0cc4c;border-radius:8px;padding:14px}.muted{color:var(--muted);font-size:14px}.message{background:#fff3bf;border:1px solid #e6b800;padding:12px;border-radius:6px;font-weight:700;margin-bottom:16px}.hidden{display:none!important}.table{width:100%;border-collapse:collapse;background:white}.table th,.table td{border-bottom:1px solid var(--line);padding:12px;text-align:left;vertical-align:top}.pill{display:inline-block;background:#eef2f7;border-radius:999px;padding:2px 10px;font-size:12px;font-weight:700}.bar{height:8px;background:#edf2f7;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:var(--gold)}.report{max-width:900px;margin:auto;background:white;color:var(--navy)}.reportPage{padding:42px;border-bottom:1px solid #eef2f7}.report h1{font-size:42px;line-height:1.18;margin:22px 0}.report h2{font-size:20px;margin:26px 0 10px;display:flex;gap:10px;align-items:center}.num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--navy);color:white;font-size:14px}.infoBox{background:#f8fafc;border-radius:6px;padding:12px}.pre{white-space:pre-wrap}.kpi td,.kpi th{border:1px solid #cbd5e1}.noPrint{display:block}.radar{width:100%;max-width:380px;margin:auto;display:block}.small{font-size:12px}.right{text-align:right}.actions{display:flex;gap:10px;flex-wrap:wrap}.nav{display:flex;gap:10px;flex-wrap:wrap}
    @media(max-width:760px){.two,.three{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.reportPage{padding:24px}.report h1{font-size:32px}.table{font-size:14px}}
    .report.landscape{width:297mm;min-height:210mm;max-width:none;padding:26px;overflow:visible}.landscapeHeader{position:relative;border-bottom:4px solid var(--gold);padding-bottom:10px}.landscapeHeader h1{font-size:30px;margin:8px 0;line-height:1.15}.landscapeGrid{display:grid;grid-template-columns:.9fr 1.15fr 1.05fr;gap:14px;font-size:10.5px;line-height:1.55;margin-top:14px}.miniTitle{display:flex;align-items:center;gap:5px;font-weight:800;font-size:13px;margin:0 0 4px}.miniNum{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--navy);color:white;font-size:9px}.miniBox{background:#f8fafc;border:1px solid var(--line);border-radius:6px;padding:7px}.miniBox h3{font-size:9.5px;margin:0 0 3px;color:var(--muted)}.miniBox p{margin:0;white-space:pre-wrap}.miniStack{display:grid;gap:7px}.tightTable th,.tightTable td{padding:4px 6px;font-size:9.5px;line-height:1.4}.radar.smallRadar{max-width:260px}.radarNote{font-size:9px;line-height:1.2;margin:0}.compactInfo{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}.compactInfo .infoBox{padding:7px}.compactInfo .muted{font-size:9.5px}.reportHint{display:block;margin-top:2px;color:var(--muted);font-size:11px;font-weight:400}.reportDate{position:absolute;right:0;top:0}.scoreList{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:4px}.bodyBlock{margin-top:0}
    @media print{@page{size:A4 landscape;margin:5mm}body{background:white;line-height:1.2}.noPrint{display:none!important}.wrap{padding:0;max-width:none}.report{box-shadow:none;max-width:none}.report.landscape{width:auto;height:200mm;min-height:0;padding:0;overflow:hidden}.landscapeHeader{padding-bottom:3px;border-bottom-width:3px}.landscapeHeader h1{font-size:20px;margin:0;line-height:1.05;padding-right:42mm}.landscapeGrid{gap:5px;margin-top:5px;font-size:8px;line-height:1.22}.miniStack{gap:3px}.miniBox{padding:3px;border-radius:4px}.miniBox h3{font-size:7.5px;margin-bottom:1px}.miniBox p{line-height:1.22}.miniTitle{font-size:9px;gap:4px;margin-bottom:1px;line-height:1.1}.miniNum{width:14px;height:14px;font-size:7.5px}.compactInfo{gap:4px}.compactInfo .infoBox{padding:4px}.compactInfo .muted{font-size:7.5px}.radar.smallRadar{max-width:178px}.radarNote{font-size:7.2px;line-height:1.1}.tightTable th,.tightTable td{padding:2px 4px;font-size:7.5px;line-height:1.2}.notice{padding:4px!important;font-size:7.5px!important;line-height:1.25!important}.small{font-size:7.5px}.topbar{gap:8px}.reportPage{page-break-inside:avoid;padding:28px 34px}.card{box-shadow:none}.printBreak{page-break-before:auto}}
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const STORE_KEY = "ldw_thingi_static_submissions_v1";
    const ADMIN_KEY = "ldw_thingi_static_admin_v1";
    const ADMIN_PASSWORD = "admin-password";
    const provider = "Life Design Works";
    const privacyNotice = "ご入力いただいた情報は、人材育成・組織開発の課題整理、分析レポート作成、研修提案のために利用します。分析にあたり、入力内容をAIで整理する場合がありますが、最終的な確認・判断は弊社が行います。";
    const diagnosticNotice = "本診断は、人材育成・組織開発上の課題整理を目的としたものです。社員個人の能力・適性・人事評価を判定するものではありません。";
    const targetLayers=["新卒社員","入社3年未満の若手社員","リーダー候補","管理職","部門横断チーム","その他"];
    const targetCounts=["5名以下","6〜10名","11〜20名","20名以上"];
    const industryOptions=["IT・通信","製造業","サービス業","小売・流通","金融・保険","医療・福祉","教育","建設・不動産","その他"];
    const employeeCountOptions=["1〜10名","11〜50名","51〜100名","101〜300名","301〜1000名","1001名以上"];
    const timings=["3ヶ月以内","6ヶ月以内","1年以内","1年以上","未定"];
    const pastTraining=["なし","あり","不明"];
    const mainIssues=["社員が指示されたことしか行わない","若手社員の主体性が育たない","報告・連絡・相談が遅い","情報共有不足によるミスや手戻りがある","個人では頑張っているがチーム成果につながらない","社員が仕事を抱え込む","部署間連携が弱い","管理職が仕事を抱え、部下に任せられない","研修後に行動が続かない","若手社員の定着・成長実感に課題がある","その他"];
    const periods=["半日〜1日","30日","3か月","6か月","未定"];
    const budgets=["30万円未満","30万〜60万円","60万〜100万円","100万〜200万円","200万円以上","未定"];
    const statuses=["未確認","分析中","面談予定","レポート作成済み","提案書作成予定","失注","成約"];
    const hearing = {
      most:["主体性が低い","報告・相談が遅い","チーム連携が弱い","若手が育たない","管理職が部下育成に悩んでいる","研修後に行動が続かない","その他"],
      layer:["新卒社員","若手社員","中堅社員","リーダー候補","管理職","全社的","その他"],
      ideal:["指示待ちではなく自分で考えて動いている","早い段階で報告・相談している","部署を越えて協力している","目標を日々の行動に落とし込んでいる","管理職が部下に任せられている","若手社員が成長実感を持っている","その他"],
      follow:["ある","一部ある","ほとんどない","これから整えたい"]
    };
    const questions=[
      [1,"主体性・判断力","社員は、指示がなくても自分で考えて行動している","自発的な提案・改善・次の行動"],[2,"主体性・判断力","問題が起きたとき、自分なりの判断や相談ができる","判断の先送り、相談のタイミング"],[3,"主体性・判断力","自分の役割と仕事の目的を理解している","役割認識、顧客・組織への価値"],
      [4,"チーム・共創力","社員同士で相談・協力できている","助けを求める、情報・知恵を共有する"],[5,"チーム・共創力","お互いの強みや得意分野を理解し、活かしている","役割分担、相互支援"],[6,"チーム・共創力","個人だけでなく、チーム全体の成果を考えている","個人最適と全体最適"],
      [7,"自己理解・キャリア","自分の強みや価値観を理解し、言語化できる","自分の軸、判断基準"],[8,"自己理解・キャリア","仕事と自分の将来・キャリアのつながりを感じている","目的意識、成長実感"],[9,"自己理解・キャリア","自分の成長目標を自分の言葉で説明できる","会社で身につけたい力"],
      [10,"目標・行動定着","個人目標が、日々の具体的な行動に落とし込まれている","行動計画、期限、測定"],[11,"目標・行動定着","社員が自分で優先順位を決められている","重要事項、時間配分"],[12,"目標・行動定着","定期的に振り返り、行動を修正・継続している","週次レビュー、習慣化"],
      [13,"上司・育成環境","上司が部下の話を聴き、価値観や目標を理解している","傾聴、承認、対話"],[14,"上司・育成環境","1on1や育成面談が定期的に機能している","頻度、目的、行動確認"],[15,"上司・育成環境","研修後の実践を確認し、支援する仕組みがある","フォロー、責任者、運用ルール"]
    ];
    const analysisFields=[
      ["overallFinding","総合所見"],["strengths","組織の強み"],["topIssues","現在の課題トップ3"],["visibleProblems","表面的に見えている問題"],["causeHypotheses","背景にある原因仮説"],["actionsToIncrease","優先して増やす行動"],["actionsToDecrease","優先して減らす行動"],["thingiFit","THINGi®︎の適合度・理由"],["notebookFit","しあわせ360°手帳の適合度・理由"],["coachingFit","コーチングの適合度・理由"],["recommendedProgram","AI分析による推奨プログラム"],["kpis","成果確認指標"],["managementSupport","経営者・管理職に求める支援"],["domainComments","5領域コメント"],["additionalQuestions","30分面談での追加確認事項"]
    ];
    const reportCharLimits={overallFinding:180,strengths:135,topIssues:150,visibleProblems:120,causeHypotheses:155,actionsToIncrease:95,actionsToDecrease:95,thingiFit:80,notebookFit:80,coachingFit:80,recommendedProgram:145,kpis:90,managementSupport:120,domainComments:140,additionalQuestions:110};
    const $ = (s)=>document.querySelector(s);
    const app = $("#app");
    const esc = (v)=>String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
    const submissions = ()=>JSON.parse(localStorage.getItem(STORE_KEY)||"[]");
    const saveAll = (items)=>localStorage.setItem(STORE_KEY,JSON.stringify(items));
    const byId = (id)=>submissions().find(s=>s.id===id);
    const fmtDate = (d)=> d ? new Date(d).toLocaleString("ja-JP") : "";
    const today = ()=>new Date().toISOString().slice(0,10);
    function route(){const [name,id]=(location.hash||"#/").replace("#/","").split("/"); if(name==="diagnosis")return renderDiagnosis(); if(name==="thanks")return renderThanks(); if(name==="admin")return id?renderDetail(id):renderAdmin(); if(name==="report")return renderReport(id); renderHome();}
    window.addEventListener("hashchange",route);
    function layout(content){app.innerHTML=content;}
    function options(arr,selected=""){return `<option value="">選択してください</option>`+arr.map(v=>`<option ${v===selected?"selected":""}>${esc(v)}</option>`).join("");}
    function selectField(name,label,arr,required=true){return `<div><label>${label}${required?'<span class="req"> *</span>':''}</label><select name="${name}" ${required?"required":""}>${options(arr)}</select></div>`}
    function inputField(name,label,type="text",required=true){return `<div><label>${label}${required?'<span class="req"> *</span>':''}</label><input name="${name}" type="${type}" ${required?"required":""}></div>`}
    function textareaField(name,label,required=false){return `<div><label>${label}${required?'<span class="req"> *</span>':''}</label><textarea name="${name}" ${required?"required":""}></textarea></div>`}
    function renderHome(){layout(`<main class="hero"><div class="wrap"><p class="brand">${provider}</p><h1>人材育成・組織開発<br>課題診断</h1><p class="lead">事前入力情報をもとに、課題の論点整理、AI分析、分析レポート作成までを一体化した診断です。</p><div class="grid three section"><div class="card"><b>無料診断</b></div><div class="card"><b>事前入力 約5分</b></div><div class="card"><b>分析レポート付き</b></div></div><div class="actions"><a class="btn gold" href="#/diagnosis">診断フォームへ進む</a><a class="btn light" href="#/admin">管理画面</a></div></div></main>`)}
    function renderDiagnosis(){layout(`<main class="wrap"><div class="topbar"><div><p class="brand">${provider}</p><h1>診断フォーム</h1><p class="muted"><span class="req">*</span> は必須項目です。</p></div><a class="btn light" href="#/">トップへ戻る</a></div><form id="diagForm" class="grid">
      <section class="card"><h2>会社情報</h2><div class="grid two">${inputField("companyName","会社名")}${selectField("industry","業種",industryOptions)}${selectField("employeeCount","従業員数",employeeCountOptions)}${inputField("officeCount","拠点数")}${inputField("contactName","担当者名")}${inputField("contactRole","役職")}${inputField("email","メールアドレス","email")}${inputField("phone","電話番号")}</div></section>
      <section class="card"><h2>事前チェック15項目</h2><p class="muted">5＝十分できている / 4＝おおむねできている / 3＝人・部署で差がある / 2＝あまりできていない / 1＝ほとんどできていない</p>${questions.map(q=>`<div class="section card"><b>${q[0]}. ${esc(q[2])}</b><p class="muted">${esc(q[1])} / 確認の観点：${esc(q[3])}</p><div class="radioGroup">${[5,4,3,2,1].map(n=>`<label><input type="radio" name="score_${q[0]}" value="${n}" required>${n}</label>`).join("")}</div><label>コメント</label><textarea name="comment_${q[0]}"></textarea></div>`).join("")}</section>
      <section class="card"><h2>人材育成・組織開発課題の確認</h2><div class="grid two">${selectField("hearingMostImportantIssue","現在もっとも困っている人材育成課題",hearing.most)}${selectField("hearingTargetLayer","その課題が強く出ている階層",hearing.layer)}${selectField("hearingIdealState","社員に望む状態",hearing.ideal)}${selectField("hearingFollowSystem","研修後の社内フォロー体制",hearing.follow)}</div>${textareaField("hearingQuestion","30分面談で特に確認したいこと")}</section>
      <section class="card"><h2>研修検討条件</h2><div class="grid two">${selectField("targetLayer","研修対象階層",targetLayers)}${selectField("targetCount","研修対象人数",targetCounts)}${selectField("desiredTiming","希望時期",timings)}${selectField("pastTraining","過去の研修実施",pastTraining)}${selectField("expectedPeriod","想定する研修期間",periods)}${selectField("budgetRange","予算感",budgets)}</div><label>検討している主な課題（複数選択可）<span class="req"> *</span></label><div class="checks">${mainIssues.map(v=>`<label class="checkrow"><input type="checkbox" name="mainIssues" value="${esc(v)}"><span>${esc(v)}${v==="その他"?'<input name="mainIssueOther" placeholder="内容" style="margin-top:8px">':""}</span></label>`).join("")}</div>${textareaField("notes","補足")}</section>
      <section class="card"><p class="notice">${privacyNotice}</p><p class="notice">${diagnosticNotice}</p><label class="checkrow"><input type="checkbox" name="consentPrivacy" required><span>入力情報の取り扱いに同意します。<span class="req"> *</span></span></label><label class="checkrow"><input type="checkbox" name="consentAi" required><span>AI利用に関する説明に同意します。AI分析は補助であり、最終判断は弊社が行います。<span class="req"> *</span></span></label><button class="btn gold" type="submit">送信する</button></section>
    </form></main>`);
      $("#diagForm").addEventListener("submit",submitDiagnosis);
    }
    function submitDiagnosis(e){e.preventDefault();const f=new FormData(e.target);const issues=f.getAll("mainIssues"); if(!issues.length){alert("主な課題を1つ以上選択してください");return;} const answers=questions.map(q=>({no:q[0],domain:q[1],question:q[2],viewpoint:q[3],score:Number(f.get("score_"+q[0])),comment:f.get("comment_"+q[0])||""})); const item={id:"s"+Date.now(),createdAt:new Date().toISOString(),status:"未確認",reportDate:today(),analysis:{},answers}; ["companyName","industry","employeeCount","officeCount","contactName","contactRole","email","phone","targetLayer","targetCount","desiredTiming","pastTraining","expectedPeriod","budgetRange","notes","hearingMostImportantIssue","hearingTargetLayer","hearingIdealState","hearingFollowSystem","hearingQuestion"].forEach(k=>item[k]=f.get(k)||""); item.mainIssues=issues.includes("その他") && f.get("mainIssueOther") ? issues.map(v=>v==="その他"?"その他："+f.get("mainIssueOther"):v).join("、") : issues.join("、"); saveAll([item,...submissions()]); location.hash="#/thanks";}
    function renderThanks(){layout(`<main class="wrap"><section class="card"><h1>送信が完了しました</h1><p>ご入力内容をもとに、Life Design Worksが事前分析を行います。30分面談では、回答内容の確認、課題の優先順位、今後の育成施策について整理します。</p><div class="card"><h2>30分面談までの流れ</h2><p>1. 入力内容の確認と事前分析<br>2. 日程調整のご案内<br>3. 30分面談の実施<br>4. 分析レポートをもとにしたご提案</p></div><a class="btn light" href="#/">トップに戻る</a></section></main>`)}
    function renderAdmin(){if(localStorage.getItem(ADMIN_KEY)!=="1")return renderLogin(); const items=submissions(); layout(`<main class="wrap"><div class="topbar"><div><p class="brand">${provider}</p><h1>管理画面</h1></div><div class="nav"><a class="btn light" href="#/">トップ</a><button class="btn light" id="logout">ログアウト</button></div></div><section class="card"><h2>診断申込み一覧</h2><table class="table"><thead><tr><th>会社名</th><th>担当者名</th><th>送信日時</th><th>ステータス</th><th></th></tr></thead><tbody>${items.map(s=>`<tr><td>${esc(s.companyName)}</td><td>${esc(s.contactName)}</td><td>${fmtDate(s.createdAt)}</td><td><span class="pill">${esc(s.status)}</span></td><td><a class="btn light" href="#/admin/${s.id}">詳細</a></td></tr>`).join("")||'<tr><td colspan="5">まだ送信データがありません。</td></tr>'}</tbody></table></section></main>`); $("#logout").onclick=()=>{localStorage.removeItem(ADMIN_KEY);route()};}
    function renderLogin(){layout(`<main class="wrap"><section class="card" style="max-width:520px;margin:auto"><h1>管理者ログイン</h1><p class="muted">静的HTML版のデモパスワード：admin-password</p><form id="login"><label>管理者ID</label><input name="id"><label>パスワード</label><input name="password" type="password" required><button class="btn gold section">ログイン</button></form></section></main>`); $("#login").onsubmit=e=>{e.preventDefault(); if(new FormData(e.target).get("password")===ADMIN_PASSWORD){localStorage.setItem(ADMIN_KEY,"1");route()}else alert("パスワードが違います")};}
    function judge(avg){if(avg>=4.2)return["強み","組織資源として活用","維持・横展開"]; if(avg>=3.4)return["安定","大きな問題はない","テーマ別改善"]; if(avg>=2.6)return["注意","人・部署にばらつき","重点テーマ化"]; if(avg>=1.8)return["優先課題","具体的施策が必要","研修・伴走支援"]; return["早期対応","組織的改善が必要","継続プログラム"];}
    function scores(s){return ["主体性・判断力","チーム・共創力","自己理解・キャリア","目標・行動定着","上司・育成環境"].map(d=>{const a=s.answers.filter(x=>x.domain===d).map(x=>x.score); const avg=Math.round((a.reduce((p,c)=>p+c,0)/a.length)*10)/10; const j=judge(avg); return {domain:d,avg,judgement:j[0],meaning:j[1],response:j[2]};});}
    function recommend(sc){const get=d=>sc.find(x=>x.domain===d); const low=sc.filter(x=>x.avg<=3.3).length; const sup=get("上司・育成環境"); if(["優先課題","早期対応"].includes(sup.judgement))return ["6か月共創型組織づくりプログラム","若手と管理職を同時に支援し、実践確認と対話の仕組みを整えます。"]; if(low>=3)return["3か月人財成長プログラム","個人の軸と行動変容を支援し、継続的な成長実感につなげます。"]; if(get("自己理解・キャリア").avg<=3.3||get("目標・行動定着").avg<=3.3)return["THINGi®︎ × しあわせ360°手帳 30日行動定着プログラム","気づきを目標と日々の習慣へつなげます。"]; return["THINGi®︎共創版 半日〜1日研修","判断・協力・共創を体験し、チームで成果を生み出す行動を促します。"];}
    function info(label,value){return `<div class="infoBox"><span class="muted">${label}</span><br><b>${esc(value||"")}</b></div>`}
    function renderDetail(id,msg=""){const s=byId(id); if(!s)return renderAdmin(); const sc=scores(s), rec=recommend(sc), overall=Math.round(sc.reduce((a,b)=>a+b.avg,0)/sc.length*10)/10; layout(`<main class="wrap"><div id="msg">${msg?`<p class="message">${esc(msg)}</p>`:""}</div><div class="topbar"><div><a href="#/admin">← 一覧へ戻る</a><h1>${esc(s.companyName)}</h1><p class="muted">${esc(s.contactName)} / ${fmtDate(s.createdAt)}</p></div><a class="btn gold" href="#/report/${s.id}">顧客レポート生成</a></div><div class="grid two"><section class="card"><h2>基本情報</h2><div class="grid two">${["companyName:会社名","industry:業種","employeeCount:従業員数","officeCount:拠点数","contactName:担当者","email:メール","phone:電話","targetLayer:研修対象階層","targetCount:研修対象人数","mainIssues:主な課題","notes:補足"].map(x=>{const [k,l]=x.split(":");return info(l,s[k]||"なし")}).join("")}</div></section><section class="card"><h2>5領域平均点・判定</h2><p>総合平均：<b>${overall}</b></p>${sc.map(x=>`<div class="section"><b>${x.domain}</b><span style="float:right">${x.avg} / ${x.judgement}</span><div class="bar"><span style="width:${x.avg/5*100}%"></span></div><p class="muted">${x.meaning} / ${x.response}</p></div>`).join("")}<div class="notice"><b>5領域スコアからの一次推奨</b><br>${rec[0]}<br><span class="muted">狙い：${rec[1]}</span></div></section></div>
    <section class="card section"><h2>管理項目</h2><form id="adminForm" class="grid two"><div><label>ステータス</label><select name="status">${statuses.map(v=>`<option ${v===s.status?"selected":""}>${v}</option>`).join("")}</select></div><div><label>面談予定日</label><input name="meetingDate" type="datetime-local" value="${esc(s.meetingDate||"")}"></div><div><label>レポート作成年月日</label><input name="reportDate" type="date" value="${esc(s.reportDate||today())}"></div>${["meetingMemo:面談メモ","priorityIssue:優先課題","recommendedPlan:レポート表示用 推奨プラン","reportComment:顧客レポートに表示するコメント"].map(x=>{const[k,l]=x.split(":");return `<div><label>${l}</label><textarea name="${k}">${esc(s[k]||"")}</textarea></div>`}).join("")}<button class="btn">管理項目を保存</button></form></section>
    <section class="card section"><h2>AI分析用プロンプト</h2><div class="actions"><button class="btn light" id="copyPrompt">コピー</button><button class="btn" id="runAi">AI分析実行</button></div><textarea id="prompt" readonly>${esc(buildPrompt(s,sc,rec))}</textarea></section>
    <section class="card section"><h2>AI分析結果の編集</h2><form id="analysisForm" class="grid two">${analysisFields.map(([k,l])=>`<div><label>${l}<span class="reportHint">レポート表示目安：${reportCharLimits[k]||"必要に応じて"}文字以内</span></label><textarea name="${k}">${esc(s.analysis?.[k]||"")}</textarea></div>`).join("")}<div class="actions"><button class="btn">AI分析結果を保存</button><button class="btn gold" type="button" id="saveReport">保存して顧客レポート生成</button></div></form></section>
    <section class="card section"><h2>事前チェック回答</h2>${s.answers.map(a=>`<div class="card section"><b>${a.no}. ${esc(a.question)}</b><p class="muted">${esc(a.domain)} / 評点：${a.score} / 観点：${esc(a.viewpoint)}</p><p>${esc(a.comment||"コメントなし")}</p></div>`).join("")}</section></main>`);
      $("#adminForm").onsubmit=e=>{e.preventDefault();updateSub(id,Object.fromEntries(new FormData(e.target)));renderDetail(id,"管理項目を保存しました。");window.scrollTo({top:0,behavior:"smooth"})};
      $("#analysisForm").onsubmit=e=>{e.preventDefault();updateSub(id,{analysis:Object.fromEntries(new FormData(e.target))});renderDetail(id,"AI分析結果を保存しました。");window.scrollTo({top:0,behavior:"smooth"})};
      $("#saveReport").onclick=()=>{updateSub(id,{analysis:Object.fromEntries(new FormData($("#analysisForm")))});location.hash="#/report/"+id};
      $("#copyPrompt").onclick=()=>navigator.clipboard.writeText($("#prompt").value).then(()=>{const button=$("#copyPrompt");button.textContent="コピー済み";setTimeout(()=>renderDetail(id,"AI分析用プロンプトをコピーしました。"),350);});
      $("#runAi").onclick=()=>{const sample=sampleAnalysis(s,sc,rec);updateSub(id,{analysis:sample});renderDetail(id,"AI分析結果を生成し、編集欄に保存しました。内容を確認して必要に応じて編集してください。")};
    }
    function updateSub(id,patch){const items=submissions().map(x=>x.id===id?{...x,...patch}:x);saveAll(items)}
    function sampleAnalysis(s,sc,rec){return {overallFinding:`${s.companyName}では、${sc.map(x=>`${x.domain}${x.avg}`).join("、")}という結果です。事前回答から、行動定着と育成環境の整備を確認する必要があります。`,strengths:"既に現場で努力している社員がいる点、課題を言語化して相談につなげようとしている点は強みです。",topIssues:"1. 主体的な判断と相談のタイミング\n2. チーム内外の情報共有\n3. 研修後の実践確認",visibleProblems:s.mainIssues,causeHypotheses:"役割期待、優先順位、振り返り機会が十分に共有されていない可能性があります。面談で確認が必要です。",actionsToIncrease:"早めの相談、週次の振り返り、他者の強みを活かした協力行動。",actionsToDecrease:"判断の先送り、仕事の抱え込み、個人任せの振り返り。",thingiFit:"判断・協力・共創を体験的に扱えるため、課題整理後の研修として適合する可能性があります。",notebookFit:"気づきを目標と行動に落とし込む支援として、しあわせ360°手帳の活用が適合する可能性があります。",coachingFit:"管理職の対話支援や1on1改善と組み合わせることで、行動継続を支えられる可能性があります。",recommendedProgram:rec[0],kpis:"自分から相談・提案する行動\n個人目標とチーム目標の理解\n週1回の振り返り実施\n他者の強みを活かす行動\n1on1・フォロー実施率",managementSupport:"経営者・管理職には、実践機会の設計、声かけ、振り返りの場づくりが求められます。",domainComments:sc.map(x=>`${x.domain}：${x.judgement}。${x.response}が有効です。`).join("\n"),additionalQuestions:"対象階層の優先順位、実施時期、研修後の社内フォロー担当、成果確認方法を確認します。"}}
    function buildPrompt(s,sc,rec){const domainDetails=sc.map(d=>{const answers=s.answers.filter(a=>a.domain===d.domain);const high=answers.filter(a=>a.score>=4).map(a=>`Q${a.no}:${a.score}`).join("、")||"なし";const low=answers.filter(a=>a.score<=2).map(a=>`Q${a.no}:${a.score}`).join("、")||"なし";const comments=answers.filter(a=>a.comment).map(a=>`Q${a.no}:${a.comment}`).join(" / ")||"コメントなし";return `${d.domain}: 平均${d.avg} / 判定${d.judgement} / 高評価:${high} / 低評価:${low} / コメント:${comments}`}).join("\\n");const answerLines=s.answers.map(a=>`${a.no}. ${a.domain}\\n質問:${a.question}\\n観点:${a.viewpoint}\\n評点:${a.score}\\nコメント:${a.comment||"なし"}`).join("\\n\\n");return `あなたは人材育成・組織開発の分析補助者です。最終的な確認・判断は弊社が行う前提で、企業担当者の事前回答を整理してください。\\n\\n重要注意:\\n${diagnosticNotice}\\n社員個人の能力、適性、性格、人事評価を断定しないでください。事実と原因仮説を分け、「可能性があります」「確認が必要です」と表現してください。\\n\\n出力項目:\\n- 総合所見\\n- 組織の強み\\n- 現在の課題トップ3\\n- 表面的に見えている問題\\n- 背景にある原因仮説\\n- 優先して増やす行動\\n- 優先して減らす行動\\n- THINGi®︎の適合度・理由\\n- しあわせ360°手帳の適合度・理由\\n- コーチングの適合度・理由\\n- AI分析による推奨プログラム\\n- 成果確認指標\\n- 経営者・管理職に求める支援\\n- 5領域コメント\\n- 30分面談での追加確認事項\\n\\n会社情報:\\n会社名:${s.companyName}\\n業種:${s.industry}\\n従業員数:${s.employeeCount}\\n拠点数:${s.officeCount}\\n担当者:${s.contactName} / ${s.contactRole}\\nメール:${s.email}\\n電話:${s.phone}\\n\\n研修検討条件:\\n対象階層:${s.targetLayer}\\n対象人数:${s.targetCount}\\n希望時期:${s.desiredTiming}\\n過去の研修実施:${s.pastTraining}\\n主な課題:${s.mainIssues}\\n想定期間:${s.expectedPeriod}\\n予算感:${s.budgetRange}\\n補足:${s.notes||"なし"}\\n\\n人材育成・組織開発課題の確認:\\n現在もっとも困っている課題:${s.hearingMostImportantIssue}\\n課題が強く出ている階層:${s.hearingTargetLayer}\\n社員に望む状態:${s.hearingIdealState}\\n研修後フォロー体制:${s.hearingFollowSystem}\\n30分面談で確認したいこと:${s.hearingQuestion||"なし"}\\n\\n管理者入力情報:\\nステータス:${s.status}\\n面談予定日:${s.meetingDate||"未設定"}\\n面談メモ:${s.meetingMemo||"なし"}\\n優先課題:${s.priorityIssue||"未設定"}\\nレポート表示用 推奨プラン:${s.recommendedPlan||"未設定"}\\n顧客レポートに表示するコメント:${s.reportComment||"なし"}\\n\\n5領域スコア:\\n${sc.map(x=>`${x.domain}:${x.avg}/${x.judgement}/${x.response}`).join("\\n")}\\n\\n5領域別詳細:\\n${domainDetails}\\n\\n5領域スコアからの一次推奨:\\n${rec[0]}\\n狙い:${rec[1]}\\n\\n事前チェック回答:\\n${answerLines}\\n\\n経営者・人事担当者等に伝わる日本語で、短い段落または箇条書きで整理してください。`;}
    function renderReport(id){const s=byId(id); if(!s)return renderAdmin(); const sc=scores(s), rec=recommend(sc), a=s.analysis||{}, plan=s.recommendedPlan||a.recommendedProgram||rec[0]; layout(`<main class="wrap"><div class="noPrint topbar"><a href="#/admin/${id}">← 詳細へ戻る</a><button class="btn gold" onclick="window.print()">PDF出力</button></div><article class="report landscape"><header class="landscapeHeader"><div><b>${provider}</b><h1>人材育成・組織開発 分析レポート</h1></div><p class="right small reportDate">作成年月日<br><b>${esc(s.reportDate||today())}</b></p></header><section class="landscapeGrid"><div class="miniStack"><h2 class="miniTitle"><span class="miniNum">1</span>基本情報</h2><div class="compactInfo"><div class="miniStack">${info("会社名",s.companyName)+info("業種",s.industry)+info("従業員数",s.employeeCount)}</div><div class="miniStack">${info("主な課題",clip(s.mainIssues,70))+info("社員に望む状態",clip(s.hearingIdealState,70))}</div></div><h2 class="miniTitle"><span class="miniNum">2</span>5領域スコア</h2><p class="radarNote">外側ほどスコアが高い状態を示します。</p>${radar(sc).replace('class="radar"','class="radar smallRadar"')}<div class="scoreList">${sc.map(x=>`<div class="miniBox"><b>${x.domain}</b><p>${x.avg} / ${x.judgement}</p></div>`).join("")}</div></div><div class="miniStack">${miniSection(3,"総合所見",a.overallFinding||s.reportComment||"面談内容を踏まえて追記します。",180)}${miniSection(4,"組織の強み",a.strengths||"事前回答と面談内容を踏まえて整理します。",135)}${miniSection(5,"現在の課題トップ3",a.topIssues||"事前回答と面談内容を踏まえて整理します。",150)}${miniSection(6,"表面的に見えている問題",a.visibleProblems||"面談で確認します。",120)}${miniSection(7,"背景にある原因仮説",a.causeHypotheses||"回答内容から考えられる仮説を面談で確認します。",155)}<div class="grid two" style="gap:7px">${miniSection(8,"増やす行動",a.actionsToIncrease||"自分から相談・提案する行動、週次の振り返り、他者の強みを活かす行動。",95)}${miniSection(9,"減らす行動",a.actionsToDecrease||"判断の先送り、仕事の抱え込み、研修後の振り返り不足。",95)}</div>${a.domainComments?miniBlock("5領域コメント",a.domainComments,140):""}</div><div class="miniStack"><h2 class="miniTitle"><span class="miniNum">10</span>推奨施策</h2>${miniBlock("レポート表示用 推奨プラン",plan,90,true)}<div class="grid two" style="gap:7px">${miniBlock("5領域スコアからの一次推奨",rec[0]+"\\n狙い："+rec[1],145)}${miniBlock("AI分析による推奨プログラム",a.recommendedProgram||"面談後に調整します。",145)}</div><div class="grid three" style="gap:7px">${miniBlock("THINGi®︎",a.thingiFit||"判断・協力・共創を体験的に扱うテーマとして適合する可能性があります。",80)}${miniBlock("しあわせ360°手帳",a.notebookFit||"気づきを目標と日々の行動に落とし込む支援として適合する可能性があります。",80)}${miniBlock("コーチング",a.coachingFit||"対話と行動継続を支える手法として適合する可能性があります。",80)}</div><h2 class="miniTitle"><span class="miniNum">11</span>成果確認指標</h2>${kpiTable(a.kpis).replace('class="table kpi"','class="table kpi tightTable"')} ${miniSection(12,"経営者・管理職に求める支援",a.managementSupport||"日常業務での声かけ、振り返り機会、実践確認の場を設計します。",120)}${miniSection(13,"30分面談での追加確認事項",a.additionalQuestions||s.hearingQuestion||"優先課題、対象階層、実施時期、フォロー体制を確認します。",110)}<p style="font-size:7.5px;line-height:1.3;margin:0 2px;color:var(--muted)">本レポートは事前回答等をもとにAIで情報整理した仮説を含む資料であり、社員個人の能力・適性・人事評価を判定するものではありません。</p></div></section></article></main>`)}
    function section(n,t,b){return `<h2><span class="num">${n}</span>${t}</h2><p class="pre">${esc(b)}</p>`}
    function recItem(t,b){return `<div class="infoBox"><b>${esc(t)}</b><p class="pre">${esc(b)}</p></div>`}
    function kpiTable(kpis){const methods=["上司観察・本人振り返り","アンケート・面談","手帳・チェック表","相互フィードバック","実施記録"]; const rows=(kpis?kpis.split(/\n/).filter(Boolean):["自分から相談・提案する行動","個人目標とチーム目標の理解","週1回の振り返り実施","他者の強みを活かす行動","1on1・フォロー実施率"]).slice(0,3); return `<table class="table kpi"><thead><tr><th>指標</th><th>確認方法</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td>${esc(clip(r,30))}</td><td>${methods[i]||"面談・記録確認"}</td></tr>`).join("")}</tbody></table>`}
    function radar(sc){const cx=180,cy=150,r=90; const pts=v=>sc.map((_,i)=>{const a=-Math.PI/2+Math.PI*2*i/sc.length,d=r*v/5;return `${cx+Math.cos(a)*d},${cy+Math.sin(a)*d}`}).join(" "); const score=pts(0).split(" ").map((_,i)=>{const a=-Math.PI/2+Math.PI*2*i/sc.length,d=r*sc[i].avg/5;return `${cx+Math.cos(a)*d},${cy+Math.sin(a)*d}`}).join(" "); return `<svg class="radar" viewBox="0 0 360 310">${[1,2,3,4,5].map(l=>`<polygon points="${pts(l)}" fill="none" stroke="#d8dee8"/>`).join("")}${sc.map((s,i)=>{const a=-Math.PI/2+Math.PI*2*i/sc.length,x=cx+Math.cos(a)*(r+54),y=cy+Math.sin(a)*(r+34);return `<text x="${x}" y="${y}" text-anchor="middle" font-size="12" font-weight="700" fill="#102a4f"><tspan x="${x}" dy="0">${s.domain}</tspan><tspan x="${x}" dy="14" font-size="11" font-weight="400">${s.avg}</tspan></text>`}).join("")}<polygon points="${score}" fill="rgba(214,168,25,.32)" stroke="#d6a819" stroke-width="3"/></svg>`}
    function clip(text,max){const value=String(text||"");return value.length>max?value.slice(0,max)+"...":value}
    function miniSection(n,t,b,max){return `<div><h2 class="miniTitle"><span class="miniNum">${n}</span>${esc(t)}</h2><section class="miniBox bodyBlock"><p>${esc(clip(b,max))}</p></section></div>`}
    function miniBlock(t,b,max,strong=false){return `<section class="miniBox"><h3>${esc(t)}</h3><p style="${strong?"font-weight:800;color:#102a4f":""}">${esc(clip(b,max))}</p></section>`}
    route();
  </script>
</body>
</html>
